appId: com.gretzke.openalarm
---
- launchApp:
    clearState: true
    clearKeychain: true
    permissions:
      all: allow
    arguments:
      uitestSkipOnboarding: true
      uitestOpenCreateAlarm: true
      uitestOpenSnoozeDuration: true
- waitForAnimationToEnd
- takeScreenshot:
    path: new-alarm-snooze-sheet
